name: publish

# Triggered automatically on a vX.Y.Z tag push, or manually via workflow_dispatch.
# This is the official, recommended way to release RuleEval NuGet packages.
# See docs/publishing.md for the full release process.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for SourceLink and git describe

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Determine the SemVer version from the git tag (vX.Y.Z → X.Y.Z)
      # or from the workflow_dispatch input when triggered manually.
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Strip leading 'v' from tag name (e.g. v0.1.0 -> 0.1.0)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          # Basic validation: must match X.Y.Z (with optional pre-release suffix)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: Version '$VERSION' does not match expected format X.Y.Z" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore RuleEval.sln

      # Pass /p:Version so that both the assembly version and the NuGet package
      # version reflect the release version derived from the git tag.
      - name: Build
        run: dotnet build RuleEval.sln -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test (unit)
        run: dotnet test tests/RuleEval.Tests.Unit/RuleEval.Tests.Unit.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Test (integration)
        run: dotnet test tests/RuleEval.Tests.Integration/RuleEval.Tests.Integration.csproj -c Release --no-build --logger "console;verbosity=normal"

      # Pack produces .nupkg (library) and .snupkg (symbols) in artifacts/nupkgs/.
      # The companion .snupkg is automatically pushed alongside its .nupkg by dotnet nuget push.
      - name: Pack
        run: dotnet pack RuleEval.sln -c Release --no-build -o artifacts/nupkgs /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: artifacts/nupkgs/

      # NUGET_API_KEY must be set as a repository secret.
      # --skip-duplicate prevents failure if the version was already published.
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push artifacts/nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
